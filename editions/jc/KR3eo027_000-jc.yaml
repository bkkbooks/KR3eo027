body:
  text: 正文中風大率生乎痰口眼歪斜語話難痰涎壅盛窒而痞半身不遂四肢癱諸家之論須詳辨古人俱系作風看河間生火東垣氣丹溪主濕皆須詳其中風邪起西北濕痰內發生東南須知中腑著四肢脈浮有表風寒醫中臟唇緩滯九竅氣塞不語多昏危中血脈則口眼歪又有中經亦要推六經無證溺調和肢不能持語不開中經之候皆如是各經分治莫胡猜左為死血少血乾痰與氣虛居右邊七情所傷為中氣將息失宜虛氣纏脈微遲緩因於氣若浮而大風調理浮而虛者此為虛或滑而沉痰疾滯浮遲虛虧可還生急大實數為凶議氣虛卒倒用參耆痰涎盛者吐之宜血虛四物為之主竹瀝二陳痰可施氣如弱者四君子愈風續命湯能舒若能預卻用何方御風丹子堪扶持傷寒為病有根源先因冬月傷於寒其邪自表傳於裡六經之病須分看脊痛頭疼及發熱浮居尺寸太陽干陽明尺寸脈俱長鼻乾目痛何能眠少陰尺寸俱沉細須知口燥舌尤干厥陰之脈多微緩更兼煩滿及囊拳少陽則弦而脅痛嘔聾口苦熱而寒太陰腹滿亦自利尺寸沉兮津少咽表裡虛實要分別須察陰陽與寒熱浮緊惡寒熱又多無汗身疼為表實浮緩發熱兼惡風身疼有汗表虛列實則麻黃以汗之虛則桂枝湯甚捷沉虛譫語便秘渴腹滿潮熱為裡實急則可施承氣湯察證分明毋妄設寒熱自利更腹鳴裡虛須補必安寧表裡虛實更要評浮洪內外熱皆生表裡虛則自汗利黃耆建中三要增內外之傷須細參虛實殊途莫倚偏氣口緊盛內所傷人迎緊盛傷於寒外感必須遵仲景內傷必是依東垣陽盛陰虛下必愈陰盛陽虛汗必全汗下一差猶反掌實實虛虛仔細看內傷之病由何來飲食勞倦相兼倍世人概誤作傷寒東垣力辨何明哉或兼外感或兼熱痰與食積宜分別須知脈大按無力或時隱伏為斯疾補中益氣雖神妙臨機應變為良訣傷風之候身發熱脈緩而浮自汗出合口不開氣亦粗面光不慘惡風列桂枝湯可治傷風九味羌活功最捷傷食身和頭或疼發熱氣口脈緊盛痞塞吞酸或吐瀉腹痛惡心暖氣盛食在上者宜吐之次以消導隨形證枳實導滯或保和枳朮健脾功若聖輕則內消曲藥治重則下之以承氣寒以乾薑稜術溫熱以芩連大黃例水涇停飲即分消葛花解醒五苓類天行時氣為瘟疫病者皆然無等別主治須知有三法降而補散為之則芩連參梗人中黃蒼附將軍防滑石六氣所傷皆致病三因內外分明識瘟家之脈散難明隨其脈狀分諸經若浮而大按無力補中帶表隨時寧大頭病濕在高顛陽明邪熱使之然資實少陽之相火各隨部位藥之安大黃梔子芩連滑普濟消毒尤能全病位在上徐徐服須知緩急依經言脈虛身熱傷暑例或大兼弱或弦細夏火炎炎克肺金必須清暑而益氣暑風挾火與挾痰內外二火相交熾脈如實者吐之安火鬱發之亦其義五苓香薷與益元桂苓甘露亦能全預卻須要補元陽生脈四君為妙方傷溫之病世多訛亦氣生來濕熱多脈來細兮更沉緩五苓滲濕蠲其痾咳謂無痰乃有聲肺氣受傷音不清嗽則無聲而有痰肺濕既動何由寧咳嗽有聲兼有痰因傷肺氣動脾經逆氣但逆而不嗽肺塞不下故上升嗽脈須知有幾般虛則為風緊是寒數乃熱多微細濕澀弦血少滑多痰治宜降火與清金風寒散之氣自伸乾咳嗽者火之郁桔梗開之次補陰勞則四物加竹瀝痰則治之以二陳肺虛味款苑兜苓實以黃芩乘杏仁肺虛甚者人參膏寒熱柴胡亦可親逆氣原來有良法木香調氣湯通神哮證主肺由於痰吐法施之當自安未治必須扶正氣已發須要辟邪干黃芩利膈及清金劫以紫荊必可寬喘急因火入肺金氣為火鬱故上升病之久者氣必虛郁痰壅滯無由舒水氣乘肺應多喘或有陰衰氣虛滿脈洪大者虛可推沉滯實者方可斷實宜葶藶桑白皮虛用五味阿參耆短氣而喘生肺散調中益氣湯尤宜痰則千緡與二陳四物加減滋其陰喘急甚者忌寒涼氣虛大麥黃耆參大要下氣與行痰降火清金尤緊關夏傷於暑秋髮瘧正氣與邪相擊搏陽分日發邪氣輕陰分深兮應間作在氣早臨血宴臨於陽為熱陰為寒並則病作離則止醫者於斯著意看弦數之脈熱相侵弦而遲者寒之因暑則人參入白虎痰以二陳加胡芩無汗必須先發汗汗多補以黃耆參久則一補又一發芎術胡芩葛二陳痰熱胸滿大便秘大柴胡湯還可治常山截瘧效尤速入小柴胡功亦異霍亂之候非鬼神內積外傷乖戾至脈壯隱伏乃為常澀而數者難調理洪而滑數熱中來若滑而弦食必滯六和理中湯亦良須用鹽湯先吐矣春傷於風夏飧泄痰火積氣兼風濕沉而遲者切為寒沉而數者亦因熱氣虛參朮芍升麻濕以五苓加二術痰積吐之豁亦宜食積必須疏導息傷食瀉者胃苓湯夏月桂苓甘露克瀉如已久要升提虛而滑脫宜收澀痢屬濕熱與食積須辨青黃赤白黑純白而來氣必傷血受病兮應是赤氣血俱傷赤白兼食積為黃是真的純血來者亦如是黑者須知為死血宛如豆汁濕中來勿妄以白為寒測通因通用也可用消積瀉濕和盪滌初而重者承氣湯輕則黃芩芍藥湯氣血俱虛為八物隨時處治方為良必以胃氣為之先氣運脈壯須用參數大身熱為難愈微而小者易為安嘔吐有聲乃有物無物有聲因謂噦有物無聲血受病有聲無物氣中決氣血如是兩皆傷聲物兼全無所失諸嘔吐酸雖屬火寒熱積痰兼氣血脈浮而洪由於氣如逢逆者謂之積沉遲厥令定為寒滑數而躁因於熱若洪而滑則多痰芩連二陳尤可啜客寒犯胃理中陽虛則香附參耆朮肝火出胃抑青丸逆氣而嘔須開鬱熱痰在胃為噁心治用芩連入二陳寒涼致傷亦有之安胃理中亦可斟膈噎之病由血乾氣弱熱痰滯氣纏緩大無力氣必虛數而有力熱邪犯數而無力或小此乃是血虛最明顯分熱沉伏即為疾沉而澀者氣相擾四物四君調氣血內觀靜養為良訣痰用二陳更加減氣則疏導與開結金水二氣須扶持最忌辛香和躁熱咳逆之候因火升故宜衝上為聲鳴木旺土哀挾相火疾與陰虛皆是因有餘不足須分明實者參以吐之可不足參朮大補丸半夏陳皮痰自寬氣虛白朮與人參陰火滑石黃連餐內傷補中益氣湯柿蒂丁香可漸安噯氣皆因痰火惱南星半夏連膏好嘈雜乃火動其痰二陳更加芩連餐諸嘔吐酸雖屬熱或有痰兮或食鬱茱萸丸子治吞酸但隨時令分寒熱平胃二陳功亦靈仔細消詳為妙訣痞疾原來與否同不能舒泰窒胸中誤下陰虛多致痞積痰濕土何能通傷寒下早亦如是仲景瀉心皆此例實者厚朴枳實湯虛者芍藥陳皮治飲食致傷消導之胸中窒塞吐之易虛氣濕吐消痞丸內傷補中而益氣痰而痞者利膈良鬱氣木香化滯湯黃連消痞效石速左金丸子功非常諸濕腫滿起中宮補中行濕應為宗腰以上腫微汗之以下小便先要通庸醫不識其中趣妄將下藥而利水若還利水氣益脫祻不旋踵必可許先師立法俱班班健脾行濕尤緊關八物五苓為佐使中滿分消立可據沉數渴煩須是熱沉遲不渴定為寒浮洪緩大可延生沉細微小無安日積塊須知有數因死血積痰五臟分右積中痰左邊血肺之積氣名息奔心是伏梁脾痞氣肝為肥氣腎奔豚咸以軟之堅可消開痰行氣為之君腹中痞積而痛者香稜丸子尤宜親千金消石五稜輩諸積殊途仔細尋滷砂巴豆消肉積葛曲遂芫酒積釋水蛭虻蟲破血癥木香檳榔氣可闢甘遂牽牛水積消礞石巴豆除食積濕痰之積滾痰丸倒倉總可蠲諸積虛勞之病細推詳須分各部及陰陽房室內傷多致此五勞七損皆能傷脈數無力損真陰大而無力傷於陽陰虛四物加知柏補陰丸子真奇方四君子湯專補氣補中益氣治勞傷上焦陽弱用天雄下部須還附子攻髓竭當歸生地黃肺弱五味天門冬心怯茯苓上黨參肝虛須以天麻芎元氣不足用參耆白朮芍藥堪調脾參草陳皮能補胃八物陰陽總得宜若不受補肌肉脫脈細而數空扶持諸蟲所生由濕熱臟肺因虛故侵蝕二陳若練治蛔蟲集效風蟲須斂跡惡熱之候為虛定惡寒非寒明熱證亢則害承乃制火極似水尤分明熱之而寒取之陽須知抑火為良方寒之極熱取之陰壯水之主鎮陽光陰平陽秘春常在水升火降何由傷諸風所發多掉眩氣血痰火皆能然數熱澀血實滑痰氣虛脈大補之全痰以二陳芩術方風則半夏天麻湯氣虛參朮加芩連血弱劑以芎歸強頭風多因痰所為滯氣與風血氣虛痛而甚者火必多四氣外傷亦要推清空膏治諸頭痛血如弱者宜芎歸勞役補中益氣湯實熱便堅承氣良痰厥而痛吐之愈四氣隨宜仔細詳頭風在右為痰熱左則為氣兼少血風則荊防薄荷宜血用四物加酒柏諸般之痛有何方立安丸子尤宜吞脅痛因痰與死血或由太盛肝氣實肝火而痛左金丸當歸龍會尤宜啜悲憂所致用何方枳殼煮散為良訣緊細而弦怒里來沉者澀者因氣鬱氣血沖和體安逸周流一身無暫息火邪傷肺氣必升熏蒸清道多痞塞七情寒熱為九氣喜則氣緩怒則逆寒乃氣收驚乃亂勞為氣耗思為結悲則消息恐則下曾和拱者氣必泄百病皆因氣所生軒岐靈素分明說怯者即著而成病若非補之何者徹正氣天香流氣輩木香檳榔丸要訣諸疝之病七般看水筋血氣弧㿗寒睪丸連小腹作痛須知此病原於肝沉緊滑大擬為虛緊持而弦冷所於挾慮必須加參朮要藥宜修守效丸梔子烏頭調疝氣丁香練實服之安腳氣有熱風寒濕亦有食積注而鬱遲緊為寒微滑虛風則為弦濡為濕牢弦乃實致困憂緊怒細悲數是熱濕居下者要升提腳氣衝心宜四物東垣健步疾如飛本經加減功尤烈痛風風熱與血虛濕痰瘀血亦要推或血受熱沸而騰寒熱搏之因痛為由於風者續命湯濕痰二陳羌術祛風濕防風羌獨活四物桃仁血可除風術流注痛無常虎骨散子功自殊痿證多因於火起火邪既旺必傷肺肺傷則木氣凌脾脾氣受傷而痿矣瀉南方則肺金清補北方兮心火制與風相類宜分別慎勿混同而論治風固外感要發散痿屬內傷宜補劑食積妨礙亦有之濕熱與痰兼血氣健步之功濕熱宜濕痰二陳竹瀝濟血虛四物補陰丸氣弱四君芩柏類茯苓滲濕湯尤宜補腎虎潛皆可議耳聾痰火與氣閉少陽厥陰多熱熾脈洪而實熱為多浮而盛者為風治澀而濡者虛之的間痰散風通聖釋大病之後急滋陰必以四物為之則目病風熱與血少腎虛神勞視漂緲如暴失明醫昏澀暴散眵淚屬於表昏澀內障腫散大久病黑花里須曉補水安神治於衰風熱散之調在表不能近視返遠視陽氣不足宜定志遠視弗克近卻明此陰氣虛宜地芝滋陰地黃療陰虛昏醫撥雲而退翳風熱則宜瀉青丸還睛丸子尤宜利口中之疾亦數端心熱口苦脾熱甘腎熱則咸胃熱淡肺熱心兮肝熱酸由來感病主唇瘡此蟲食臟瀉心湯下唇有瘡號曰狐黃芩湯主食其肛實熱而來涼膈散理中湯療中氣傷急者又宜加附子各經去熱隨宜量喉舌之疾多痰火雖分緩急與多少微而輕者緩藥之急而甚者砭之可若還喉痹吐為奇桐油射干急可施實大硝石荊黃連虛以四物加參耆雄黃解毒疾如雷金玉鑰匙立便開牙齒或痛或出血陽明經病須分別或有風兮或有濕或是蟲兮或是熱實熱承氣入黃連蟲則色變熏之煙大寒犯腦白芷散牙齦腫者砭之全吐衄之血由於熱錯經妄行而久溢輕則身涼又脈靜重則脈大而身熱大要涼血與行血補陰抑陽乃仁術四物梔子及童便犀角地黃湯可啜急則治標十灰散茜根散子治之訣咳唾之血亦惡證血虛身熱又痰盛雞蘇散治吐中血八物咳血靈似聖咯血四物地黃膏聖餅七珍功立應痰涎之血出於脾葛根甘草芍黃耆舌上無故出血者摻以槐花莫待遲溺中來者亦因熱發灰四物兼山梔小薊飲子效雖速牛膝芍藥功尤奇脫肛是熱氣血虛氣弱參耆與芎歸血虛四物加黃柏香荊吊腸應自除下血皆因熱與虛梔子阿膠和四物虛者必佐以乾薑風邪下陷升提訣痔家為病起何因食飽皆因傷其筋筋脈橫解致賜僻木乘火勢刑肺金風熱燥濕四物多宜以苦寒加辛溫升麻枳殼槐角歸黃連生地與參苓加減四物治腸風當歸和血散通神自汗濕熱與氣弱若是陰虛盜汗作自汗參耆佐桂枝盜汗六黃湯要藥厥證亦因氣血弱外感熱痰因致疾數熱弦痰外感浮血虛脈大微氣涉陽衰於下厥則寒陰衰於下熱之厥四物君子分氣血要知承氣偏除熱痰以白朮竹瀝攻外感解散加薑汁寒而厥者逆物湯八味順氣調氣厥癇症之作驚與痰醫師何必五般看尋火與痰分多少蔞升半夏及黃連痰之甚者先宜吐安神又要平其肝上消心火爍肺金大小便稠必多飲中消在胃偏多食小便黃赤古經云下消屬腎火炎炎便濁如膏一似煎養血養筋和降火生津甘露益其源上消白虎加人參中以承氣三黃吞下消降火補真陰六味地黃丸自安帶濁之病由濕熱因虛與痰赤屬血色如白者氣中來必須先去中宮濕胃中濁氣滲膀胱二陳二術升胡湯或可吐以提其氣珍珠粉丸亦妙方思慮傷心而致者瑞連丸子尤相當夢遺之病熱相煎精滑須知濕熱兼氣血因虛難固守熱則流通理自然虛者益之宜八物定志寧神堪保安帶濁之法亦相因樗根丸子塞其源淋家之候如何訣氣血俱虛兼熱結解熱利便梔子仁四物調氣芎歸血死血淋者牛膝膏二陳吐以伸痰熱小便若閉氣血弱氣結熱痰亦要作皆須吐以提其氣氣升水降安其霍氣服參耆後吐之血以四物芎歸著痰則二陳加木通濕熱而淋八證藥秘結因虛與風濕火寒津少兼氣結脾約之病如斯論大便秘而小便頻胃中伏火潤腸丸脾約開脾結自伸麻仁丸子理風疾承氣下之消實熱津液不足地黃丸七宣桃仁實之設還虛治秘厚朴湯巴豆牽牛毋妄訣疸因濕熱積之因猶如盒曲致而成醫者不須分五種大小溫中較重輕胃苓滲濕亦可用汗下通便仔細評痛癢瘡瘍心火系膏梁之變瘡毒起陰陽相滯失調和榮氣不從逆肉理淺則為癰深則疽要審經絡分明治腫瘍內托亦可消潰者大補其血氣黃連消毒五香等奪命散子皆良劑癩受風毒殺厲氣酷烈暴悍真堪畏大率多在陽明經胃與大腸受其氣氣之受者上體多血如致傷居下體通天醉散效須奇堅心守之方可治血枯經閉怎生通四物更入桃仁中體脂滿閉而然者導痰又入黃連芳肥人痰多佔血海蒼朮附芎功亦倍過期四物入參耆陳皮白朮升麻會肥而白者痰為殃蒼朮星附二陳湯不及期者血之熱四物再加芩連強將行而痛血之實桃仁連附紅花方行後作痛氣虛入四物湯調痛自康若或過期又色淡二陳佐以芎歸昌過期不止用固經臨機應變醫之良陰虛陽博為崩中虛則下溜熱流通急則治標石灰丸參耆四物為之宗妊娠養血與清熱四物條芩兼白朮一經產後體即虛必須大補於血氣惡寒發熱病來侵氣血之虛亦要分右手脈虛宜補氣左如不及血上尋若還腹痛由何因或為食積血不通飲食致傷消導之使用保和痛自融小兒之疾最難醫口不能言辨是非惟在揣摩而推測聽聲察色探其微虎口脈紋辨吉凶三關通度無安日紫脈為風紅感寒青則為驚白是疳若見黑紋為中惡應知黃色困脾端大率肝與脾病多驚疳吐瀉食不和父母無知務姑息養之不謹斯為痾痘瘡之病因何起胎養穢血之毒氣或為乖氣之所觸邪氣與毒相交熾榮氣不足內理逆痘疹由是而生矣毒之輕者痘必稀穢重液者瘡尤致若還稠甚急解毒人參敗毒犀角地色之黑者為血熱白者須知當補氣中黑陷而外白起氣血相兼細調理初起自汗亦不妨濕熱熏蒸之所致瘡如濕者宜去濕防風白芷尤宜制將成就兮色又淡四物紅花還可議色之紫者宜涼血芩連升葛連翹例紅點若見忌葛根虛實卻宜分表裡吐瀉少食里必弱陷伏倒靨表裡虛治虛而癢者宜實表黑陷倒靨燒人屎錢氏則用柏祥丸後人代以宣風類大如聖散療咽疼木香理中調吐利泄瀉甚則豆蔻丸毒氣內伏宜托裡四君補氣乃仁術補血須知宜四物涼血解毒是何方酒炒芩連毒自釋糞清厥冷與吐利陷伏沉細為寒擬洪數渴秘兩腮紅齊勇掀撥胡熱熾木香異攻雜妙訣卻宜仔細分寒熱陰陽虛實粲然明萬舉萬全無一失驚風亦有數般分慢驚脾弱補而溫急則痰熱宜涼瀉慢則面青熱不侵若植身溫而又赤須知此乃驚之急急則奪命與抱龍慢則安神與參朮錢氏吐瀉論玄微五補五瀉明無疑若欲調脾平胃散參苓白朮憑君施搜輯病歌雖鄙言將為先後承其傳間附己意或疑闕以俟同道後來賢七方之法乃良訣大小奇偶復緩急君二臣四偶之法君一臣二奇之術君一臣三大方劑小方君一而臣二大方劑大頓服之小方劑小徐徐濟補上治上緩之宜補下治下急之利緩者奇治三四方奇乃單奇之取義偶則相合如配偶急則攻下而氣厚奇方之數則為陽惟以發表為良方偶方之治可攻裡大方大病則相當症之小者方亦小若與大者反成傷心肺位近宜制小肝腎制大為其綱主病之藥為之君應君之劑則為臣應其臣者為佐使君臣有序方為珍十劑之妙尤玄秘宣則可以宣壅痞補可去弱虛為宜通則可以通其滯劑之輕者可以實瀉者可以通其閉怯者須以重之推著者必以滑之意濕以潤燥澀固脫燥可去濕更何說熱則治寒宜桂附寒能治熱硝黃設辛甘發散氣陽參酸苦湧泄陰味別攻裡應宜以寒劑發表須知不遠熱必以歲氣為之主毋發天和乖其理更參愛惡之性情是乃立方之大旨
